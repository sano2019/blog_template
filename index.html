---
layout: default
---

<div class="container">
  <header style="margin-bottom: 3rem; text-align: center;">
    <h1>{{ site.title }}</h1>
    <p>{{ site.description }}</p>
  </header>

  <div class="post-grid">
    {% for post in site.posts %}
    <article class="card">
      {% if post.image %}
        <img src="{{ post.image }}" class="card-image" alt="{{ post.title }}">
      {% endif %}
      <div class="card-content">
        <h2 class="card-title"><a href="{{ post.url }}">{{ post.title }}</a></h2>
        <p style="color: var(--text-muted);">{{ post.description | truncate: 100 }}</p>
        <small>{{ post.date | date: "%B %d, %Y" }}</small>
      </div>
    </article>
    {% endfor %}
  </div>
</div>
